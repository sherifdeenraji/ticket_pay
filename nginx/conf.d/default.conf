# ── HTTP: ACME challenge + redirect all to HTTPS ─────────────────────────────
server {
    listen 80;
    server_name ticketpay.com.ng www.ticketpay.com.ng api.ticketpay.com.ng admin.ticketpay.com.ng;

    # Let's Encrypt / Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Backend API — api.ticketpay.com.ng ───────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.ticketpay.com.ng;

    ssl_certificate     /etc/letsencrypt/live/ticketpay.com.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ticketpay.com.ng/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Increase body size limit for file uploads if needed
    client_max_body_size 10M;

    location / {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# ── Student Frontend — ticketpay.com.ng ──────────────────────────────────────
server {
    listen 443 ssl;
    server_name ticketpay.com.ng www.ticketpay.com.ng;

    ssl_certificate     /etc/letsencrypt/live/ticketpay.com.ng/fullchain.pem;
