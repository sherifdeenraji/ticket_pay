version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: ticketpay-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ticketpay_user
      POSTGRES_PASSWORD: ticketpay_password
      POSTGRES_DB: ticketpay
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: ticketpay-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
