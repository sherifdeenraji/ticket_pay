name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # CI GATE: Build & verify all three services in parallel
  # ────────────────────────────────────────────────────────────────────────────
  ci:
    name: Build & Verify (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true        # cancel all jobs if any service fails to build
      matrix:
        service: [backend, frontend, admin]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: Build
        working-directory: ${{ matrix.service }}
        run: npm run build
        env:
          # Suppress Next.js telemetry during CI
          NEXT_TELEMETRY_DISABLED: 1
          # Provide a placeholder so env validation in backend doesn't fail at build time
          SKIP_ENV_VALIDATION: true

  # ────────────────────────────────────────────────────────────────────────────
  # BUILD & PUSH DOCKER IMAGES to GitHub Container Registry
  # Runs after ALL ci jobs pass, builds all images in parallel
  # ────────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write      # required to push to GHCR

    strategy:
      matrix:
        service: [backend, frontend, admin]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer caching — dramatically speeds up repeat builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.ticketpay.com.ng/api

  # ────────────────────────────────────────────────────────────────────────────
  # DEPLOY: SSH into VPS, pull new images, rolling restart (zero downtime)
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker
    environment: production    # optional: adds a manual approval gate in GitHub UI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose & nginx config to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "docker-compose.yml,nginx/,init.sql"
          target: "~/ticketpay"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd ~/ticketpay

            # ── Update image tag in the existing .env (managed by admin on VPS) ─
            touch .env
            sed -i '/^IMAGE_TAG=/d' .env
            sed -i '/^GITHUB_REPOSITORY=/d' .env
            echo "IMAGE_TAG=${{ github.sha }}" >> .env
            echo "GITHUB_REPOSITORY=${{ github.repository }}" >> .env

            # ── Log in to GHCR to pull private images ────────────────────────
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # ── Pull new images ───────────────────────────────────────────────
            docker compose pull backend frontend admin

            # ── Rolling restart: one service at a time (DB/Redis untouched) ───
            docker compose up -d --no-deps --remove-orphans backend
            docker compose up -d --no-deps --remove-orphans frontend
            docker compose up -d --no-deps --remove-orphans admin
            docker compose up -d --no-deps nginx certbot

            # ── Cleanup dangling images ───────────────────────────────────────
            docker image prune -f

            echo "✅ Deployment complete — $(date)"
